<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Flexible Boxes</title>
    </head>

    <body>
    

        <h2>Exemplo todos alinhados</h2>
        <div id="container">
            <div class="item">A</div>
            <div class="item">B</div>
            <div class="item">C</div>
        </div>

       <br> <br> <hr> <br> <br>

        <h2>Exemplo Maior</h2>
        <div id="container2">
            <div class="item2">A</div>
            <div class="item2-2">B</div>
            <div class="item2-1">C</div>
        </div>

        <br> <br> <hr> <br> <br>

        <h2>Exemplo Menor</h2>
        <div id="container3">
            <div class="item3">A</div>
            <div class="item3-1">B</div>
            <div class="item3-2">C</div>
        </div>


        
    </body>
</html>
